<svg width="800" height="1200" viewBox="0 0 800 1200" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="1200" fill="#050505"/>
  <defs>
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:0.2" />
      <stop offset="100%" style="stop-color:#000;stop-opacity:0" />
    </linearGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="white" stroke-width="0.5" stroke-opacity="0.05"/>
    </pattern>
  </defs>
  <rect width="800" height="1200" fill="url(#grid)" />
  <text x="40" y="80" font-family="Arial Black" font-size="12" fill="#3b82f6" letter-spacing="4" opacity="0.8">CELEBRITIES WITH</text>
  <text x="40" y="160" font-family="Arial Black" font-size="80" fill="white" letter-spacing="-2">OBLONG</text>
  <text x="40" y="210" font-family="Arial Black" font-size="40" fill="#3b82f6" letter-spacing="1">FACE SHAPES</text>
  <g transform="translate(40, 620)">
    <rect width="340" height="400" rx="20" fill="url(#blueGrad)" stroke="white" stroke-opacity="0.1"/>
    <text x="20" y="40" font-family="Arial Black" font-size="24" fill="white">OBLONG FACE SHAPE</text>
    <ellipse cx="170" cy="280" rx="45" ry="100" fill="none" stroke="#3b82f6" stroke-width="2" stroke-dasharray="4 2"/>
  </g>
  <g transform="translate(420, 620)">
    <text x="0" y="20" font-family="Arial Black" font-size="18" fill="white">RECOMMENDED FRAMES</text>
    <rect x="0" y="70" width="340" height="100" rx="10" fill="white" fill-opacity="0.05"/><text x="10" y="105" font-family="Arial" font-size="12" fill="white">Square, Round, Aviator</text>
  </g>
  <text x="40" y="1180" font-family="Arial" font-size="10" fill="#3b82f6" letter-spacing="2">BALANCE IS KEY</text>
</svg>
